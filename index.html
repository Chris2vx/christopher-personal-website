<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Christopher's Personal Website</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #0b1220;
            color: #e2e8f0;
            line-height: 1.6;
        }
        
        header {
            background: #111827;
            color: #f8fafc;
            padding: 2rem;
            text-align: center;
            box-shadow: inset 0 -1px 0 rgba(226, 232, 240, 0.08);
        }
        
        h1 {
            margin: 0;
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: -0.04em;
        }
        
        .container {
            max-width: 760px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        .profile-image {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(148, 163, 184, 0.28);
            margin: 2rem auto;
            display: block;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
        }
        
        .about-section {
            text-align: center;
            margin-top: 2rem;
        }
        
        .about-section h2 {
            color: #94a3b8;
            margin-bottom: 1rem;
            font-weight: 400;
            letter-spacing: 0.04em;
        }
        
        .video-section {
            text-align: center;
            margin-top: 3rem;
            padding: 2rem 0;
        }
        
        .video-section h2 {
            color: #94a3b8;
            margin-bottom: 1.5rem;
            font-weight: 400;
            letter-spacing: 0.04em;
        }
        
        .video-container {
            max-width: 560px;
            margin: 0 auto;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 70px rgba(0, 0, 0, 0.4);
        }
        
        p {
            max-width: 700px;
            margin: 0 auto;
            color: #cbd5e1;
        }
    </style>
</head>
<body>
    <header>
        <h1>Christopher Polanco</h1>
    </header>
    
    <div class="container">
        <img src="cherry-blossom.jpg" alt="Cherry Blossoms" class="profile-image">
        
        <div class="about-section">
            <h2>About Me</h2>
            <p>Greetings!, I'm Christopher, I am cook and I am currently going to school for cybersecurity. Welcome to my personal website where I'm going to share my thoughts, projects and experiences.</p>
        </div>
        
        <div class="video-section">
            <h2>Featured Video</h2>
            <div class="video-container">
                <iframe width="560" height="315" 
                        src="https://www.youtube-nocookie.com/embed/oWY3fW2VpjQ" 
                        title="YouTube video player" 
                        frameborder="0" 
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                        allowfullscreen>
                </iframe>
            </div>
        </div>
    </div>
</body>
</html>
